[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 3000
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Recordatorios (9:00 AM, 1:00 PM, 4:00 PM, 7:00 PM hora Venezuela -> UTC 13, 17, 20, 23)
[functions."daily-reminders"]
  schedule = "0 13,17,20,23 * * *"

# Tiempo extra para funciones de IA (OpenRouter free tier puede tardar hasta 20s)
[functions."prospector"]
  timeout = 26

[functions."chat"]
  timeout = 26

[functions."appraiser"]
  timeout = 26
