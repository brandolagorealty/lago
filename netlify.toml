[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 3000
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Recordatorios diarios a las 12:00 PM hora Venezuela (UTC-4 = 16:00 UTC)
[functions."daily-reminders"]
  schedule = "0 16 * * *"
