[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 3000
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Recordatorios cada 12 horas
[functions."daily-reminders"]
  schedule = "0 */12 * * *"

# Tiempo extra para funciones de IA (OpenRouter free tier puede tardar hasta 20s)
[functions."prospector"]
  timeout = 26

[functions."chat"]
  timeout = 26

[functions."appraiser"]
  timeout = 26
